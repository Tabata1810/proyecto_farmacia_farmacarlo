{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0" style="border-radius: 20px;">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">Editar Proveedor</h3>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre de la Empresa</label>
                            <input type="text" name="empresa" class="form-control rounded-pill" value="{{ prov.nombre_empresa }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Contacto (Vendedor)</label>
                            <input type="text" name="nombre" class="form-control rounded-pill" value="{{ prov.contacto_vendedor }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Teléfono</label>
                            <input type="text" name="telefono" class="form-control rounded-pill" value="{{ prov.telefono_proveedor }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Correo Electrónico</label>
                            <input type="email" name="correo" class="form-control rounded-pill" value="{{ prov.correo }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Dirección</label>
                            <textarea name="direccion" class="form-control" rows="2" style="border-radius: 15px;">{{ prov.direccion }}</textarea>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary rounded-pill">Guardar Cambios</button>
                            <a href="{{ url_for('manejar_proveedores') }}" class="btn btn-light rounded-pill">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
